<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BS4IT Cloud Inventory</title>
</head>
<body>

  <h1>BS4IT Cloud Inventory</h1>

  <p id="summary">Carregando inventário...</p>

  <table border="1">
    <thead>
      <tr>
        <th>Conta</th>
        <th>Serviço</th>
        <th>Nome</th>
        <th>Tipo</th>
        <th>Estado</th>
        <th>Região</th>
      </tr>
    </thead>
    <tbody id="inventory-table"></tbody>
  </table>

  <script>
    fetch("./inventory.json")
      .then(response => response.json())
      .then(data => {
        document.getElementById("summary").innerText =
          `Total de recursos encontrados: ${data.length}`;

        const table = document.getElementById("inventory-table");

        data.forEach(item => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${item.account_id}</td>
            <td>${item.service}</td>
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>${item.state}</td>
            <td>${item.region}</td>
          `;

          table.appendChild(row);
        });
      })
      .catch(error => {
        document.getElementById("summary").innerText =
          "Erro ao carregar inventory.json";
        console.error(error);
      });
  </script>

</body>
</html>
